name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Faster incremental compilation in CI — avoids re-linking unchanged crates.
  CARGO_INCREMENTAL: 0
  # Tighter debug info reduces artifact size without hiding symbol names.
  RUSTFLAGS: "-C debuginfo=1"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # run all three even if one fails — useful for OS-specific bugs
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cache ~/.cargo/registry and the target directory between runs.
      # The cache key includes the OS and Cargo.lock so it is invalidated
      # whenever a dependency changes.
      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test --all-targets
