  <script type="text/babel" data-type="module">
const { useState, useCallback, useMemo, useRef } = React;

const MONO = "'JetBrains Mono','Fira Code',monospace";

function hexToHSL(hex) {
  var r = parseInt(hex.slice(1, 3), 16) / 255;
  var g = parseInt(hex.slice(3, 5), 16) / 255;
  var b = parseInt(hex.slice(5, 7), 16) / 255;
  var max = Math.max(r, g, b), min = Math.min(r, g, b);
  var h = 0, s = 0, l = (max + min) / 2;
  if (max !== min) {
    var d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else h = ((r - g) / d + 4) / 6;
  }
  return [h * 360, s * 100, l * 100];
}

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s)) / 100;
  l = Math.max(0, Math.min(100, l)) / 100;
  var c = (1 - Math.abs(2 * l - 1)) * s;
  var x = c * (1 - Math.abs((h / 60) % 2 - 1));
  var m = l - c / 2;
  var r = 0, g = 0, b = 0;
  if (h < 60) { r = c; g = x; }
  else if (h < 120) { r = x; g = c; }
  else if (h < 180) { g = c; b = x; }
  else if (h < 240) { g = x; b = c; }
  else if (h < 300) { r = x; b = c; }
  else { r = c; b = x; }
  var toH = function(v) { var hx = Math.round((v + m) * 255).toString(16); return hx.length === 1 ? "0" + hx : hx; };
  return "#" + toH(r) + toH(g) + toH(b);
}

function adjustColor(hex, hShift, sShift, lShift) {
  if (!hex || !hex.startsWith("#") || hex.length < 7) return hex;
  var hsl = hexToHSL(hex);
  return hslToHex(hsl[0] + hShift, hsl[1] + sShift, hsl[2] + lShift);
}

function adjustPalette(pal, hShift, sShift, lShift) {
  if (hShift === 0 && sShift === 0 && lShift === 0) return pal;
  var out = {};
  for (var k of Object.keys(pal)) {
    out[k] = adjustColor(pal[k], hShift, sShift, lShift);
  }
  return out;
}

function stripComment(line) {
  var inQ = false;
  for (var i = 0; i < line.length; i++) {
    if (line[i] === '"' && (i === 0 || line[i-1] !== '\\')) inQ = !inQ;
    if (line[i] === '#' && !inQ) return line.slice(0, i);
  }
  return line;
}

function countChars(s, open, close) {
  var d = 0, inQ = false;
  for (var i = 0; i < s.length; i++) {
    if (s[i] === '"' && (i === 0 || s[i-1] !== '\\')) inQ = !inQ;
    if (!inQ && s[i] === open) d++;
    if (!inQ && s[i] === close) d--;
  }
  return d;
}

function splitPairs(s) {
  var pairs = [], cur = "", depth = 0, inQ = false;
  for (var i = 0; i < s.length; i++) {
    var c = s[i];
    if (c === '"' && (i === 0 || s[i-1] !== '\\')) inQ = !inQ;
    if (!inQ) {
      if (c === '[' || c === '{') depth++;
      if (c === ']' || c === '}') depth--;
      if (c === ',' && depth === 0) { pairs.push(cur.trim()); cur = ""; continue; }
    }
    cur += c;
  }
  if (cur.trim()) pairs.push(cur.trim());
  return pairs;
}

function parseInlineVal(s) {
  s = s.trim();
  if (s.startsWith('"') && s.endsWith('"')) return s.slice(1, -1);
  if (s.startsWith('{') && s.endsWith('}')) return parseInlineTable(s);
  if (s.startsWith('[')) return s;
  return s;
}

function parseInlineTable(s) {
  var inner = s.slice(1, -1).trim();
  if (!inner) return {};
  var obj = {};
  var pairs = splitPairs(inner);
  for (var i = 0; i < pairs.length; i++) {
    var eq = pairs[i].indexOf('=');
    if (eq === -1) continue;
    var k = pairs[i].slice(0, eq).trim().replace(/^"|"$/g, "");
    var v = pairs[i].slice(eq + 1).trim();
    obj[k] = parseInlineVal(v);
  }
  return obj;
}

function parseTOML(text) {
  var result = {};
  var cur = result;
  var lines = text.split("\n");
  var i = 0;
  while (i < lines.length) {
    var line = stripComment(lines[i]).trim();
    i++;
    if (!line) continue;

    var sec = line.match(/^\[([^\]]+)\]$/);
    if (sec) {
      cur = result;
      var parts = sec[1].split(".");
      for (var p = 0; p < parts.length; p++) {
        if (!cur[parts[p]]) cur[parts[p]] = {};
        cur = cur[parts[p]];
      }
      continue;
    }

    var eq = line.indexOf('=');
    if (eq === -1) continue;
    var key = line.slice(0, eq).trim().replace(/^"|"$/g, "");
    var val = line.slice(eq + 1).trim();

    var braceDepth = countChars(val, '{', '}');
    var bracketDepth = countChars(val, '[', ']');
    while ((braceDepth > 0 || bracketDepth > 0) && i < lines.length) {
      var nextLine = stripComment(lines[i]).trim();
      i++;
      val += " " + nextLine;
      braceDepth += countChars(nextLine, '{', '}');
      bracketDepth += countChars(nextLine, '[', ']');
    }
    val = val.trim();

    if (val.startsWith('{') && val.endsWith('}')) {
      cur[key] = parseInlineTable(val);
    } else if (val.startsWith('"') && val.endsWith('"')) {
      cur[key] = val.slice(1, -1);
    } else {
      cur[key] = val;
    }
  }
  return result;
}

function exportTOML(palette, scopes) {
  let out = "[palette]\n";
  for (const [k, v] of Object.entries(palette)) {
    out += '"' + k + '" = "' + v + '"\n';
  }
  out += "\n";
  const sections = {};
  for (const [k, v] of Object.entries(scopes)) {
    const dot = k.lastIndexOf(".");
    if (dot === -1) {
      if (typeof v === "object") {
        const parts = Object.entries(v).map(function(e) { return e[0] + ' = "' + e[1] + '"'; }).join(", ");
        out += '"' + k + '" = { ' + parts + " }\n";
      } else {
        out += '"' + k + '" = "' + v + '"\n';
      }
    } else {
      const sec = k.slice(0, dot);
      const key = k.slice(dot + 1);
      if (!sections[sec]) sections[sec] = [];
      sections[sec].push([key, v]);
    }
  }
  for (const [sec, entries] of Object.entries(sections)) {
    out += "\n[" + sec + "]\n";
    for (const [key, v] of entries) {
      if (typeof v === "object") {
        const parts = Object.entries(v).map(function(e) { return e[0] + ' = "' + e[1] + '"'; }).join(", ");
        out += '"' + key + '" = { ' + parts + " }\n";
      } else {
        out += '"' + key + '" = "' + v + '"\n';
      }
    }
  }
  return out;
}

const SCOPES = [
  ["UI", [
    "ui.background", "ui.foreground", "ui.cursor", "ui.cursor.match",
    "ui.selection", "ui.selection.primary", "ui.linenr", "ui.linenr.selected",

    "operator", "function", "function.method", "function.macro",
    "tag", "type", "type.builtin",
    "variable", "variable.builtin", "variable.parameter",
    "label", "punctuation", "punctuation.bracket", "punctuation.delimiter",

const ALL_SCOPES = SCOPES.flatMap(function(s) { return s[1]; });

const DEFAULT_PAL = {

const DEFAULT_SC = {

  "ui.statusline": { fg: "white", bg: "dark-gray" },

  "function.macro": "cyan", tag: "red", type: "yellow",
  "type.builtin": "yellow", variable: "white",
  "variable.builtin": "red", "variable.parameter": "orange",
  label: "cyan", punctuation: "light-gray",
  "punctuation.bracket": "light-gray", "punctuation.delimiter": "light-gray",
  namespace: "magenta", attribute: "yellow", module: "magenta",
  "markup.heading": "blue", "markup.bold": "orange",
  "markup.italic": "magenta", "markup.link": "cyan",
  "markup.raw": "green", "markup.list": "red",
  "diff.plus": "green", "diff.minus": "red", "diff.delta": "yellow",
  "diagnostic.error": "red", "diagnostic.warning": "yellow",

};

function resolve(val, pal) {
  if (!val) return null;
  if (typeof val === "object") return { fg: resolve(val.fg, pal), bg: resolve(val.bg, pal) };
  if (val.startsWith("#")) return val;
  return pal[val] || val;
}

function scopeLookup(id, sc, pal) {
  var key = id;
  while (key) {
    if (sc[key] !== undefined && sc[key] !== "") {
      return resolve(sc[key], pal);
    }
    var dot = key.lastIndexOf(".");
    if (dot === -1) break;
    key = key.slice(0, dot);
  }
  return null;
}

function fgc(id, sc, pal, fb) {
  var c = scopeLookup(id, sc, pal);
  if (!c) return fb;
  return typeof c === "object" ? (c.fg || fb) : c;
}

function bgc(id, sc, pal, fb) {
  var c = scopeLookup(id, sc, pal);
  if (!c) return fb;
  return typeof c === "object" ? (c.bg || fb) : "transparent";
}

function Acc({ title, open, onToggle, count, children }) {
  return (
    <div style={{ borderBottom: "1px solid #2a2d3a" }}>
      <button onClick={onToggle} style={{
        width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "10px 14px", background: open ? "#1e2030" : "transparent", border: "none",
        cursor: "pointer", color: "#c8cdd8", fontSize: 12, fontFamily: MONO,
        fontWeight: 600, letterSpacing: "0.05em", textTransform: "uppercase",
      }}>
        <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ display: "inline-block", transform: open ? "rotate(90deg)" : "rotate(0)", transition: "transform 0.2s", fontSize: 10 }}>
            {"\u25B6"}
          </span>
          {title}
        </span>
        {count != null && (
          <span style={{ background: "#363a4f", color: "#8087a2", borderRadius: 8, padding: "1px 7px", fontSize: 10 }}>{count}</span>
        )}
      </button>
      {open && (
        <div style={{ padding: "6px 10px 10px", background: "#181926", maxHeight: "50vh", overflowY: "auto" }}>
          {children}
        </div>
      )}
    </div>
  );
}

function Swatch({ color, size }) {
  return (
    <span style={{
      display: "inline-block", width: size || 10, height: size || 10, borderRadius: 2,
      background: color || "transparent", border: "1px solid rgba(255,255,255,0.15)", flexShrink: 0,
    }} />
  );
}

function ScopeRow({ id, value, palette, onChange }) {
  const isObj = typeof value === "object" && value !== null;
  const fgVal = isObj ? (value.fg || "") : (value || "");
  const bgVal = isObj ? (value.bg || "") : "";
  const hasBg = isObj || id.startsWith("ui.");
  const palNames = Object.keys(palette);

  const [fgCustom, setFgCustom] = useState(false);
  const [bgCustom, setBgCustom] = useState(false);
  const [fgHex, setFgHex] = useState("");
  const [bgHex, setBgHex] = useState("");

  const emit = function(newFg, newBg) {
    if (hasBg) { onChange({ fg: newFg, bg: newBg }); }
    else { onChange(newFg); }
  };

  const sel = {
    background: "#24273a", border: "1px solid #363a4f", color: "#cad3f5",
    borderRadius: 4, padding: "3px 6px", fontSize: 11, fontFamily: MONO,
    flex: 1, minWidth: 0, outline: "none",
  };

  var rFg = resolve(fgVal, palette);
  var rBg = resolve(bgVal, palette);

  function renderSelect(val, isCustom, hexVal, setCustom, setHex, isBgField) {
    var handleSel = function(e) {
      var v = e.target.value;
      if (v === "__custom__") { setCustom(true); return; }
      setCustom(false);
      if (isBgField) { emit(fgVal, v); }
      else { emit(v, bgVal); }
    };
    var handleHex = function(e) {
      setHex(e.target.value);
      if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
        if (isBgField) { emit(fgVal, e.target.value); }
        else { emit(e.target.value, bgVal); }
      }
    };
    return (
      <div style={{ flex: 1, minWidth: 0 }}>
        <select value={isCustom ? "__custom__" : val} onChange={handleSel} style={sel}>
          <option value="">{"-- none --"}</option>
          {palNames.map(function(n) { return <option key={n} value={n}>{n}</option>; })}
          <option value="__custom__">{"Custom hex"}</option>
        </select>
        {isCustom && (
          <input type="text" placeholder="#ff00aa" value={hexVal} onChange={handleHex}
            style={{ background: "#24273a", border: "1px solid #363a4f", color: "#cad3f5", borderRadius: 4, padding: "3px 6px", fontSize: 11, fontFamily: MONO, outline: "none", width: "100%", marginTop: 3, boxSizing: "border-box" }} />
        )}
      </div>
    );
  }

  return (
    <div style={{ padding: "6px 4px", borderBottom: "1px solid #1e2030" }}>
      <div style={{ fontSize: 11, color: "#8087a2", marginBottom: 4, fontFamily: MONO, display: "flex", alignItems: "center", gap: 6 }}>
        <Swatch color={rFg} />
        {hasBg && <Swatch color={rBg} />}
        <span style={{ opacity: 0.7 }}>{id}</span>
      </div>
      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
        <span style={{ fontSize: 9, color: "#5b6078", width: 16, flexShrink: 0 }}>FG</span>
        {renderSelect(fgVal, fgCustom, fgHex, setFgCustom, setFgHex, false)}
      </div>
      {hasBg && (
        <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 4 }}>
          <span style={{ fontSize: 9, color: "#5b6078", width: 16, flexShrink: 0 }}>BG</span>
          {renderSelect(bgVal, bgCustom, bgHex, setBgCustom, setBgHex, true)}
        </div>
      )}
    </div>
  );
}

var CODE = [
  { n: 1, t: [["use ", "keyword"], ["std", "namespace"], ["::", "punctuation.delimiter"], ["collections", "module"], ["::", "punctuation.delimiter"], ["HashMap", "type"], [";", "punctuation.delimiter"]] },
  { n: 2, t: [] },
  { n: 3, t: [["/// A theme palette for the editor", "comment"]] },
  { n: 4, t: [["pub ", "keyword"], ["struct ", "keyword"], ["Theme", "type"], [" {", "punctuation.bracket"]] },
  { n: 5, sel: true, t: [["    name", "variable"], [":", "punctuation.delimiter"], [" String", "type.builtin"], [",", "punctuation.delimiter"]] },
  { n: 6, t: [["    colors", "variable"], [":", "punctuation.delimiter"], [" HashMap", "type"], ["<", "punctuation.bracket"], ["String", "type.builtin"], [", ", "punctuation.delimiter"], ["Color", "type"], [">", "punctuation.bracket"], [",", "punctuation.delimiter"]] },
  { n: 7, t: [["}", "punctuation.bracket"]] },
  { n: 8, t: [] },
  { n: 9, t: [["impl ", "keyword"], ["Theme", "type"], [" {", "punctuation.bracket"]] },
  { n: 10, t: [["    pub ", "keyword"], ["fn ", "keyword.function"], ["new", "function"], ["(", "punctuation.bracket"], ["name", "variable.parameter"], [": ", "punctuation.delimiter"], ["&", "operator"], ["str", "type.builtin"], [")", "punctuation.bracket"], [" -> ", "operator"], ["Self", "type.builtin"], [" {", "punctuation.bracket"]] },
  { n: 11, t: [["        let ", "keyword"], ["count", "variable"], [" = ", "operator"], ["42", "constant.numeric"], [";", "punctuation.delimiter"]] },
  { n: 12, t: [["        let ", "keyword"], ["msg", "variable"], [" = ", "operator"], ['"Theme loaded"', "string"], [";", "punctuation.delimiter"]] },
  { n: 13, t: [["        println!", "function.macro"], ["(", "punctuation.bracket"], ['"{}"', "string"], [", ", "punctuation.delimiter"], ["msg", "variable"], [")", "punctuation.bracket"], [";", "punctuation.delimiter"]] },
  { n: 14, t: [["        Self", "type.builtin"], [" { ", "punctuation.bracket"], ["name", "variable"], [": ", "punctuation.delimiter"], ["name", "variable.parameter"], [".", "punctuation.delimiter"], ["to_string", "function.method"], ["()", "punctuation.bracket"], [" }", "punctuation.bracket"]] },
  { n: 15, t: [["    }", "punctuation.bracket"]] },
  { n: 16, t: [["}", "punctuation.bracket"]] },
  { n: 17, t: [] },
];

function Preview({ pal, sc }) {
  var BG = bgc("ui.background", sc, pal, "#1a1b26");
  var FG = fgc("ui.foreground", sc, pal, fgc("ui.text", sc, pal, "#c0caf5"));
  var lnr = fgc("ui.linenr", sc, pal, "#565f89");
  var lnrS = fgc("ui.linenr.selected", sc, pal, "#e0af68");

  var stFg = fgc("ui.statusline", sc, pal, "#c0caf5");
  var stBg = bgc("ui.statusline", sc, pal, "#33374c");
  var mnFg = fgc("ui.statusline.normal", sc, pal, "#1a1b26");
  var mnBg = bgc("ui.statusline.normal", sc, pal, "#7aa2f7");
  var brd = fgc("ui.window", sc, pal, "#565f89");

  return (

          <span style={{ width: 10, height: 10, borderRadius: "50%", background: s("diff.plus") }} />
        </div>

                {line.t.length === 0 && <span>{"\u00a0"}</span>}

                  var col = tok[1] ? s(tok[1]) : FG;
                  return (
                    <span key={i} style={{ color: col, fontStyle: tok[1] === "comment" ? "italic" : "normal" }}>{tok[0]}</span>
                  );
                })}
              </span>
            </div>
          );
        })}
