const { useState, useCallback, useMemo, useRef } = React;

const MONO = "'JetBrains Mono','Fira Code',monospace";

function hexToHSL(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0, s = 0;
  const l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else h = ((r - g) / d + 4) / 6;
  }
  return [h * 360, s * 100, l * 100];
}

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s)) / 100;
  l = Math.max(0, Math.min(100, l)) / 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r = 0, g = 0, b = 0;
  if (h < 60) { r = c; g = x; }
  else if (h < 120) { r = x; g = c; }
  else if (h < 180) { g = c; b = x; }
  else if (h < 240) { g = x; b = c; }
  else if (h < 300) { r = x; b = c; }
  else { r = c; b = x; }
  const toH = v => { const hx = Math.round((v + m) * 255).toString(16); return hx.length === 1 ? "0" + hx : hx; };
  return "#" + toH(r) + toH(g) + toH(b);
}

function adjustColor(hex, hShift, sShift, lShift) {
  if (!hex || !hex.startsWith("#") || hex.length < 7) return hex;
  const hsl = hexToHSL(hex);
  return hslToHex(hsl[0] + hShift, hsl[1] + sShift, hsl[2] + lShift);
}

function adjustPalette(pal, hShift, sShift, lShift) {
  if (hShift === 0 && sShift === 0 && lShift === 0) return pal;
  const out = {};
  for (const k of Object.keys(pal)) out[k] = adjustColor(pal[k], hShift, sShift, lShift);
  return out;
}

// Shared string-aware scanner. Yields { i, c, inStr } for every character;
// inStr=true while inside a "..." or '...' literal (delimiters and escapes included).
// Handles: single-quoted strings, escaped backslashes in double-quoted strings,
// quoted TOML keys containing dots or '=', and inline array/table values.
function* scanString(s) {
  let inDouble = false, inSingle = false, escape = false;
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (escape) { escape = false; yield { i, c, inStr: true }; continue; }
    if (inDouble) {
      if (c === '\\') { escape = true; yield { i, c, inStr: true }; continue; }
      if (c === '"') { inDouble = false; yield { i, c, inStr: true }; continue; }
      yield { i, c, inStr: true }; continue;
    }
    if (inSingle) {
      if (c === "'") { inSingle = false; yield { i, c, inStr: true }; continue; }
      yield { i, c, inStr: true }; continue;
    }
    if (c === '"') { inDouble = true; yield { i, c, inStr: true }; continue; }
    if (c === "'") { inSingle = true; yield { i, c, inStr: true }; continue; }
    yield { i, c, inStr: false };
  }
}

function stripComment(line) {
  for (const { i, c, inStr } of scanString(line)) {
    if (!inStr && c === '#') return line.slice(0, i);
  }
  return line;
}

function countChars(s, open, close) {
  let d = 0;
  for (const { c, inStr } of scanString(s)) {
    if (!inStr) {
      if (c === open) d++;
      if (c === close) d--;
    }
  }
  return d;
}

function splitPairs(s) {
  const pairs = [];
  let cur = "", depth = 0;
  for (const { c, inStr } of scanString(s)) {
    if (inStr) { cur += c; continue; }
    if (c === '[' || c === '{') { depth++; cur += c; continue; }
    if (c === ']' || c === '}') { depth--; cur += c; continue; }
    if (c === ',' && depth === 0) { pairs.push(cur.trim()); cur = ""; continue; }
    cur += c;
  }
  if (cur.trim()) pairs.push(cur.trim());
  return pairs;
}

// Split a TOML dotted key (e.g. `a."b.c"` or `"ui.cursor"`) on dots outside
// string literals, then strip surrounding quotes from each segment.
function splitDottedKey(s) {
  const parts = [];
  let cur = "";
  for (const { c, inStr } of scanString(s)) {
    if (inStr) { cur += c; continue; }
    if (c === '.') { parts.push(cur.trim().replace(/^["']|["']$/g, "")); cur = ""; continue; }
    cur += c;
  }
  if (cur.trim()) parts.push(cur.trim().replace(/^["']|["']$/g, ""));
  return parts;
}

function parseInlineArray(s) {
  const inner = s.slice(1, -1).trim();
  if (!inner) return [];
  return splitPairs(inner).map(e => parseInlineVal(e));
}

function parseInlineVal(s) {
  s = s.trim();
  if (s.startsWith('"') && s.endsWith('"')) return s.slice(1, -1);
  if (s.startsWith("'") && s.endsWith("'")) return s.slice(1, -1);
  if (s.startsWith('{') && s.endsWith('}')) return parseInlineTable(s);
  if (s.startsWith('[') && s.endsWith(']')) return parseInlineArray(s);
  return s;
}

function parseInlineTable(s) {
  const inner = s.slice(1, -1).trim();
  if (!inner) return {};
  const obj = {};
  for (const pair of splitPairs(inner)) {
    const eq = pair.indexOf('=');
    if (eq === -1) continue;
    const k = pair.slice(0, eq).trim().replace(/^["']|["']$/g, "");
    obj[k] = parseInlineVal(pair.slice(eq + 1).trim());
  }
  return obj;
}

function parseTOML(text) {
  const result = {};
  let cur = result;
  const lines = text.split("\n");
  let i = 0;
  while (i < lines.length) {
    const line = stripComment(lines[i]).trim();
    i++;
    if (!line) continue;

    const sec = line.match(/^\[([^\]]+)\]$/);
    if (sec) {
      cur = result;
      for (const part of splitDottedKey(sec[1])) {
        if (!cur[part]) cur[part] = {};
        cur = cur[part];
      }
      continue;
    }

    // Find '=' outside string literals (keys may contain quoted '=').
    let eq = -1;
    for (const { i: pos, c, inStr } of scanString(line)) {
      if (!inStr && c === '=') { eq = pos; break; }
    }
    if (eq === -1) continue;

    // "ui.cursor" → ["ui.cursor"] → "ui.cursor"; ui.cursor → ["ui","cursor"] → "ui.cursor".
    // Both produce the same flat key to match the shape upstream Helix themes use.
    const key = splitDottedKey(line.slice(0, eq).trim()).join(".");
    let val = line.slice(eq + 1).trim();

    let braceDepth = countChars(val, '{', '}');
    let bracketDepth = countChars(val, '[', ']');
    while ((braceDepth > 0 || bracketDepth > 0) && i < lines.length) {
      const nextLine = stripComment(lines[i]).trim();
      i++;
      val += " " + nextLine;
      braceDepth += countChars(nextLine, '{', '}');
      bracketDepth += countChars(nextLine, '[', ']');
    }
    val = val.trim();

    if (val.startsWith('{') && val.endsWith('}')) {
      cur[key] = parseInlineTable(val);
    } else if (val.startsWith('[') && val.endsWith(']')) {
      cur[key] = parseInlineArray(val);
    } else if (val.startsWith('"') && val.endsWith('"')) {
      cur[key] = val.slice(1, -1);
    } else if (val.startsWith("'") && val.endsWith("'")) {
      cur[key] = val.slice(1, -1);
    } else {
      cur[key] = val;
    }
  }
  return result;
}

// Single value formatter — arrays and nested tables are never wrapped in quotes.
function formatVal(v) {
  if (Array.isArray(v)) return "[ " + v.map(formatVal).join(", ") + " ]";
  if (typeof v === "string") return '"' + v.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
  if (typeof v === "object" && v !== null) {
    const parts = Object.entries(v).map(([k, val]) => k + " = " + formatVal(val)).join(", ");
    return "{ " + parts + " }";
  }
  return String(v);
}

// Pull scope definitions from a parsed TOML object. Skips `palette` and `inherits`.
// Promotes nested sections (e.g. `[ui]` with bare `cursor = "..."`) into flat
// dotted keys ("ui.cursor"), matching the shape the editor uses.
function extractScopes(parsed) {
  const ns = {};
  const SCOPE_KEYS = ["fg", "bg", "modifiers", "underline", "style"];
  for (const _k of Object.keys(parsed)) {
    if (_k === "palette" || _k === "inherits") continue;
    const v = parsed[_k];
    if (typeof v === "string") {
      ns[_k] = v;
    } else if (typeof v === "object" && v !== null) {
      const isScopeDef = Object.keys(v).some(k => SCOPE_KEYS.includes(k));
      if (isScopeDef) {
        ns[_k] = v;
      } else {
        for (const [sk, sv] of Object.entries(v)) {
          ns[_k + "." + sk] = sv;
        }
      }
    }
  }
  return ns;
}

// Emit every scope as a flat top-level quoted dotted key, then [palette] last.
// We avoid [section] headers: TOML section semantics would merge a `[diff]` header
// with an existing top-level `"diff" = "overlay"` into one nested object, losing
// sub-keys after extractScopes. Flat keys match upstream Helix themes (rose_pine, etc.).
function exportTOML(palette, scopes) {
  let out = "";
  for (const [k, v] of Object.entries(scopes)) out += '"' + k + '" = ' + formatVal(v) + '\n';
  out += "\n[palette]\n";
  for (const [k, v] of Object.entries(palette)) out += '"' + k + '" = ' + formatVal(v) + '\n';
  return out;
}

function resolve(val, pal) {
  if (!val) return null;
  if (typeof val === "object") return { fg: resolve(val.fg, pal), bg: resolve(val.bg, pal) };
  if (val.startsWith("#")) return val;
  return pal[val] || val;
}

function scopeLookup(id, sc, pal) {
  let key = id;
  while (key) {
    if (sc[key] !== undefined && sc[key] !== "") return resolve(sc[key], pal);
    const dot = key.lastIndexOf(".");
    if (dot === -1) break;
    key = key.slice(0, dot);
  }
  return null;
}

function fgc(id, sc, pal, fb) {
  const c = scopeLookup(id, sc, pal);
  if (!c) return fb;
  return typeof c === "object" ? (c.fg || fb) : c;
}

function bgc(id, sc, pal, fb) {
  const c = scopeLookup(id, sc, pal);
  if (!c) return fb;
  return typeof c === "object" ? (c.bg || fb) : "transparent";
}

function Acc({ title, open, onToggle, count, children }) {
  return (
    <div style={{ borderBottom: "1px solid #2a2d3a" }}>
      <button onClick={onToggle} style={{
        width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "10px 14px", background: open ? "#1e2030" : "transparent", border: "none",
        cursor: "pointer", color: "#c8cdd8", fontSize: 12, fontFamily: MONO,
        fontWeight: 600, letterSpacing: "0.05em", textTransform: "uppercase",
      }}>
        <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ display: "inline-block", transform: open ? "rotate(90deg)" : "rotate(0)", transition: "transform 0.2s", fontSize: 10 }}>
            {"▶"}
          </span>
          {title}
        </span>
        {count != null && (
          <span style={{ background: "#363a4f", color: "#8087a2", borderRadius: 8, padding: "1px 7px", fontSize: 10 }}>{count}</span>
        )}
      </button>
      {open && (
        <div style={{ padding: "6px 10px 10px", background: "#181926", maxHeight: "50vh", overflowY: "auto" }}>
          {children}
        </div>
      )}
    </div>
  );
}

function Swatch({ color, size }) {
  return (
    <span style={{
      display: "inline-block", width: size || 10, height: size || 10, borderRadius: 2,
      background: color || "transparent", border: "1px solid rgba(255,255,255,0.15)", flexShrink: 0,
    }} />
  );
}

function ScopeRow({ id, value, palette, onChange }) {
  const isObj = typeof value === "object" && value !== null;
  const fgVal = isObj ? (value.fg || "") : (value || "");
  const bgVal = isObj ? (value.bg || "") : "";
  const hasBg = isObj || id.startsWith("ui.");
  const palNames = Object.keys(palette);

  const [fgCustom, setFgCustom] = useState(false);
  const [bgCustom, setBgCustom] = useState(false);
  const [fgHex, setFgHex] = useState("");
  const [bgHex, setBgHex] = useState("");

  const emit = (newFg, newBg) => {
    if (hasBg) onChange({ fg: newFg, bg: newBg });
    else onChange(newFg);
  };

  const sel = {
    background: "#24273a", border: "1px solid #363a4f", color: "#cad3f5",
    borderRadius: 4, padding: "3px 6px", fontSize: 11, fontFamily: MONO,
    flex: 1, minWidth: 0, outline: "none",
  };

  const rFg = resolve(fgVal, palette);
  const rBg = resolve(bgVal, palette);

  function renderSelect(val, isCustom, hexVal, setCustom, setHex, isBgField) {
    const handleSel = e => {
      const v = e.target.value;
      if (v === "__custom__") { setCustom(true); return; }
      setCustom(false);
      if (isBgField) emit(fgVal, v); else emit(v, bgVal);
    };
    const handleHex = e => {
      setHex(e.target.value);
      if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
        if (isBgField) emit(fgVal, e.target.value); else emit(e.target.value, bgVal);
      }
    };
    return (
      <div style={{ flex: 1, minWidth: 0 }}>
        <select value={isCustom ? "__custom__" : val} onChange={handleSel} style={sel}>
          <option value="">{"-- none --"}</option>
          {palNames.map(n => <option key={n} value={n}>{n}</option>)}
          <option value="__custom__">{"Custom hex"}</option>
        </select>
        {isCustom && (
          <input type="text" placeholder="#ff00aa" value={hexVal} onChange={handleHex}
            style={{ background: "#24273a", border: "1px solid #363a4f", color: "#cad3f5", borderRadius: 4, padding: "3px 6px", fontSize: 11, fontFamily: MONO, outline: "none", width: "100%", marginTop: 3, boxSizing: "border-box" }} />
        )}
      </div>
    );
  }

  return (
    <div style={{ padding: "6px 4px", borderBottom: "1px solid #1e2030" }}>
      <div style={{ fontSize: 11, color: "#8087a2", marginBottom: 4, fontFamily: MONO, display: "flex", alignItems: "center", gap: 6 }}>
        <Swatch color={rFg} />
        {hasBg && <Swatch color={rBg} />}
        <span style={{ opacity: 0.7 }}>{id}</span>
      </div>
      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
        <span style={{ fontSize: 9, color: "#5b6078", width: 16, flexShrink: 0 }}>FG</span>
        {renderSelect(fgVal, fgCustom, fgHex, setFgCustom, setFgHex, false)}
      </div>
      {hasBg && (
        <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 4 }}>
          <span style={{ fontSize: 9, color: "#5b6078", width: 16, flexShrink: 0 }}>BG</span>
          {renderSelect(bgVal, bgCustom, bgHex, setBgCustom, setBgHex, true)}
        </div>
      )}
    </div>
  );
}

function Preview({ pal, sc }) {
  const BG = bgc("ui.background", sc, pal, "#1a1b26");
  const FG = fgc("ui.foreground", sc, pal, fgc("ui.text", sc, pal, "#c0caf5"));
  const lnr = fgc("ui.linenr", sc, pal, "#565f89");
  const lnrS = fgc("ui.linenr.selected", sc, pal, "#e0af68");
  const selBg = bgc("ui.selection", sc, pal, "#33374c");
  const stFg = fgc("ui.statusline", sc, pal, "#c0caf5");
  const stBg = bgc("ui.statusline", sc, pal, "#33374c");
  const mnFg = fgc("ui.statusline.normal", sc, pal, "#1a1b26");
  const mnBg = bgc("ui.statusline.normal", sc, pal, "#7aa2f7");
  const brd = fgc("ui.window", sc, pal, "#565f89");
  const fg = id => fgc(id, sc, pal, FG);
  const statusBg = stBg !== "transparent" ? stBg : BG;

  return (
    <div style={{ background: BG, borderRadius: 8, overflow: "hidden", border: "1px solid #2a2d3a", fontFamily: MONO, fontSize: 13, lineHeight: "20px", boxShadow: "0 8px 32px rgba(0,0,0,0.4)" }}>
      <div style={{ display: "flex", alignItems: "center", padding: "6px 14px", borderBottom: "1px solid #2a2d3a", background: "#1a1b26", gap: 8 }}>
        <div style={{ display: "flex", gap: 6 }}>
          <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#ff5f56" }} />
          <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#ffbd2e" }} />
          <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#27c93f" }} />
        </div>
        <span style={{ color: "#5c6086", fontSize: 11 }}>theme.rs</span>
      </div>
      <div style={{ padding: "4px 0", overflowX: "auto" }}>
        {CODE.map(line => {
          const isCur = line.n === 5;
          return (
            <div key={line.n} style={{ display: "flex", padding: "0 12px 0 0", background: isCur ? selBg + "44" : "transparent", minHeight: 20 }}>
              <span style={{ display: "inline-block", width: 44, textAlign: "right", paddingRight: 12, color: isCur ? lnrS : lnr, userSelect: "none", flexShrink: 0, fontSize: 12 }}>{line.n}</span>
              <span style={{ background: line.sel ? selBg + "88" : "transparent", borderRadius: line.sel ? 2 : 0, padding: line.sel ? "0 2px" : "0", whiteSpace: "pre" }}>
                {line.t.length === 0 && <span>{" "}</span>}
                {line.t.map((tok, i) => (
                  <span key={i} style={{ color: tok[1] ? fg(tok[1]) : FG, fontStyle: tok[1] === "comment" ? "italic" : "normal" }}>{tok[0]}</span>
                ))}
              </span>
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", alignItems: "center", borderTop: "1px solid " + brd, fontSize: 11, fontFamily: MONO }}>
        <span style={{ padding: "3px 10px", background: mnBg, color: mnFg, fontWeight: 700 }}>NOR</span>
        <span style={{ padding: "3px 10px", background: statusBg, color: stFg, flex: 1 }}>theme.rs [+]</span>
        <span style={{ padding: "3px 10px", background: statusBg, color: lnr }}>5:1</span>
        <span style={{ padding: "3px 10px", background: statusBg, color: lnr }}>UTF-8 rust</span>
      </div>
    </div>
  );
}

function HelixThemeEditor() {
  const [palette, setPalette] = useState(() => ({...DEFAULT_PAL}));
  const [scopes, setScopes] = useState(() => ({...DEFAULT_SC}));
  const [newName, setNewName] = useState("");
  const [newColor, setNewColor] = useState("#ffffff");
  const [filter, setFilter] = useState("");
  const [catFilter, setCatFilter] = useState("All");
  const [hShift, setHShift] = useState(0);
  const [sShift, setSShift] = useState(0);
  const [lShift, setLShift] = useState(0);
  const adjPalette = useMemo(() => adjustPalette(palette, hShift, sShift, lShift), [palette, hShift, sShift, lShift]);
  const [palOpen, setPalOpen] = useState(true);
  const [scOpen, setScOpen] = useState(true);
  const [hslOpen, setHslOpen] = useState(true);
  // Inherits handling: child themes (`inherits = "..."`) only override the
  // parent's palette/scopes. We stash the child's overrides, show a banner
  // asking the user to import the parent, then merge child-on-top when it
  // arrives. `loadedParent` tracks whether a non-inherits theme is loaded so
  // the order can be reversed (parent first, then child).
  const [pendingChild, setPendingChild] = useState(null);
  const [inheritBanner, setInheritBanner] = useState(null);
  const [loadedParent, setLoadedParent] = useState(false);
  const fileRef = useRef(null);

  const handleImport = useCallback(e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = parseTOML(ev.target.result);
        const newPalette = parsed.palette || {};
        const newScopes = extractScopes(parsed);
        const hasInherits = typeof parsed.inherits === "string" && parsed.inherits.length > 0;
        setHShift(0); setSShift(0); setLShift(0);

        if (hasInherits) {
          if (loadedParent) {
            // Parent already loaded — merge child overrides on top.
            setPalette(p => ({...p, ...newPalette}));
            setScopes(s => ({...s, ...newScopes}));
            setPendingChild(null);
            setInheritBanner(null);
          } else {
            // No parent yet — apply child for visual feedback, stash for later
            // merge, and show the banner so the user knows to import the parent.
            setPalette(newPalette);
            setScopes(newScopes);
            setPendingChild({ palette: newPalette, scopes: newScopes });
            setInheritBanner({ parent: parsed.inherits });
          }
        } else {
          if (pendingChild) {
            // Child was imported first; this is the parent. Parent first, child on top.
            setPalette({...newPalette, ...pendingChild.palette});
            setScopes({...newScopes, ...pendingChild.scopes});
            setPendingChild(null);
            setInheritBanner(null);
          } else {
            setPalette(newPalette);
            setScopes(newScopes);
            setInheritBanner(null);
          }
          setLoadedParent(true);
        }
      } catch (err) {
        console.error("Parse error", err);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }, [loadedParent, pendingChild]);

  const handleExport = useCallback(() => {
    const toml = exportTOML(adjPalette, scopes);
    const blob = new Blob([toml], { type: "application/toml" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "theme.toml";
    a.click();
    URL.revokeObjectURL(url);
  }, [adjPalette, scopes]);

  const addColor = () => {
    if (newName.trim() && /^#[0-9a-fA-F]{6}$/.test(newColor)) {
      setPalette(p => ({...p, [newName.trim()]: newColor}));
      setNewName("");
      setNewColor("#ffffff");
    }
  };

  const cats = ["All"].concat(SCOPES.map(([name]) => name));

  const filtered = useMemo(() => ALL_SCOPES.filter(id => {
    if (catFilter !== "All") {
      const cat = SCOPES.find(([, items]) => items.includes(id));
      if (cat && cat[0] !== catFilter) return false;
    }
    return !filter || id.toLowerCase().includes(filter.toLowerCase());
  }), [filter, catFilter]);

  return (
    <div style={{ minHeight: "100vh", background: "#11111b", color: "#cdd6f4", fontFamily: MONO, display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "12px 20px", background: "#181825", borderBottom: "1px solid #2a2d3a", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
        <span style={{ fontSize: 18, fontWeight: 700, color: "#cba6f7", letterSpacing: "0.04em" }}>
          {"⬡ helix theme editor"}
        </span>
        <div style={{ display: "flex", gap: 8 }}>
          <input type="file" ref={fileRef} accept=".toml" onChange={handleImport} style={{ display: "none" }} />
          <button onClick={() => fileRef.current?.click()} style={{ background: "#313244", color: "#cdd6f4", border: "1px solid #45475a", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontFamily: MONO, fontSize: 12 }}>
            {"Import TOML"}
          </button>
          <button onClick={handleExport} style={{ background: "#89b4fa", color: "#11111b", border: "none", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontFamily: MONO, fontSize: 12, fontWeight: 600 }}>
            {"Export TOML"}
          </button>
        </div>
      </div>

      {inheritBanner && (
        <div style={{ padding: "8px 20px", background: "#3a2f1a", borderBottom: "1px solid #4a3f2a", color: "#f9e2af", fontFamily: MONO, fontSize: 12, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
          <span>
            {"This theme inherits from "}
            <code style={{ background: "#1f1a0e", padding: "1px 6px", borderRadius: 3, color: "#fab387" }}>{inheritBanner.parent + ".toml"}</code>
            {" — import the parent file to apply its scopes. Child overrides are stashed and will be re-applied on top."}
          </span>
          <button onClick={() => { setInheritBanner(null); setPendingChild(null); }} style={{ background: "transparent", border: "1px solid #4a3f2a", color: "#f9e2af", borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontFamily: MONO, fontSize: 11, flexShrink: 0 }} title="Dismiss and discard pending overrides">{"×"}</button>
        </div>
      )}

      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
        <div style={{ flex: 1, padding: 24, overflowY: "auto", display: "flex", flexDirection: "column", gap: 20 }}>
          <Preview pal={adjPalette} sc={scopes} />

          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            {["diagnostic.error", "diagnostic.warning", "diagnostic.info", "diagnostic.hint"].map(d => {
              const c = fgc(d, scopes, adjPalette, "#888");
              return (
                <div key={d} style={{ padding: "6px 14px", borderRadius: 6, background: c + "18", borderLeft: "3px solid " + c, color: c, fontSize: 11, fontFamily: MONO }}>
                  {d.split(".")[1]}
                </div>
              );
            })}
          </div>

          <div style={{ borderRadius: 6, overflow: "hidden", border: "1px solid #2a2d3a", fontFamily: MONO, fontSize: 12 }}>
            <div style={{ padding: "4px 12px", background: "#1a1b26", color: "#5c6086", fontSize: 10, borderBottom: "1px solid #2a2d3a" }}>diff preview</div>
            {[["diff.plus", "+ added line"], ["diff.minus", "- removed line"], ["diff.delta", "~ changed line"]].map(([scope, label]) => {
              const c = fgc(scope, scopes, adjPalette, "#888");
              return <div key={scope} style={{ padding: "4px 12px", background: c + "15", color: c }}>{label}</div>;
            })}
          </div>

          <div style={{ borderRadius: 6, padding: "12px 16px", background: bgc("ui.background", scopes, adjPalette, "#1a1b26"), border: "1px solid #2a2d3a", fontFamily: MONO, fontSize: 12, lineHeight: "22px" }}>
            <div style={{ color: fgc("markup.heading", scopes, adjPalette, "#7aa2f7"), fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{"# Markup Preview"}</div>
            <div style={{ color: fgc("ui.foreground", scopes, adjPalette, "#c0caf5") }}>
              {"Normal text with "}
              <span style={{ color: fgc("markup.bold", scopes, adjPalette, "#ff9e64"), fontWeight: 700 }}>{"**bold**"}</span>
              {" and "}
              <span style={{ color: fgc("markup.italic", scopes, adjPalette, "#bb9af7"), fontStyle: "italic" }}>{"_italic_"}</span>
              {" and "}
              <span style={{ color: fgc("markup.link", scopes, adjPalette, "#7dcfff"), textDecoration: "underline" }}>{"[link](url)"}</span>
            </div>
            <div style={{ color: fgc("markup.list", scopes, adjPalette, "#f7768e") }}>{"- list item"}</div>
            <span style={{ color: fgc("markup.raw", scopes, adjPalette, "#9ece6a"), background: fgc("markup.raw", scopes, adjPalette, "#9ece6a") + "15", padding: "1px 5px", borderRadius: 3 }}>{"`code`"}</span>
          </div>
        </div>

        <div style={{ width: 340, flexShrink: 0, background: "#1e1e2e", borderLeft: "1px solid #2a2d3a", overflowY: "auto", display: "flex", flexDirection: "column" }}>
          <Acc title="Palette" open={palOpen} onToggle={() => setPalOpen(!palOpen)} count={Object.keys(palette).length}>
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              {Object.entries(palette).map(([name, color]) => (
                <div key={name} style={{ display: "flex", alignItems: "center", gap: 6, padding: "4px 2px", borderBottom: "1px solid #1e2030" }}>
                  <input type="color" value={color} onChange={e => setPalette(p => ({...p, [name]: e.target.value}))} style={{ width: 26, height: 22, padding: 0, border: "1px solid #363a4f", borderRadius: 3, background: "transparent", cursor: "pointer", flexShrink: 0 }} />
                  <span style={{ flex: 1, fontSize: 12, color: "#cad3f5", fontFamily: MONO, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{name}</span>
                  <span style={{ fontSize: 10, color: "#5b6078", fontFamily: MONO, flexShrink: 0 }}>{color}</span>
                  <button onClick={() => setPalette(p => { const n = {...p}; delete n[name]; return n; })} style={{ background: "none", border: "none", color: "#5b6078", cursor: "pointer", padding: "0 2px", fontSize: 14, lineHeight: 1, flexShrink: 0 }} title="Remove">{"×"}</button>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 6, marginTop: 8, alignItems: "center", paddingTop: 6, borderTop: "1px solid #2a2d3a" }}>
              <input type="color" value={newColor} onChange={e => setNewColor(e.target.value)} style={{ width: 26, height: 22, padding: 0, border: "1px solid #363a4f", borderRadius: 3, background: "transparent", cursor: "pointer", flexShrink: 0 }} />
              <input type="text" value={newName} onChange={e => setNewName(e.target.value)} placeholder="name" onKeyDown={e => { if (e.key === "Enter") addColor(); }} style={{ flex: 1, background: "#24273a", border: "1px solid #363a4f", color: "#cad3f5", borderRadius: 4, padding: "3px 6px", fontSize: 11, fontFamily: MONO, outline: "none", minWidth: 0 }} />
              <button onClick={addColor} style={{ background: "#a6e3a1", color: "#11111b", border: "none", borderRadius: 4, padding: "3px 10px", cursor: "pointer", fontFamily: MONO, fontSize: 11, fontWeight: 600, flexShrink: 0 }}>{"+"}</button>
            </div>
          </Acc>

          <Acc title="Scopes" open={scOpen} onToggle={() => setScOpen(!scOpen)} count={ALL_SCOPES.length}>
            <div style={{ marginBottom: 8 }}>
              <input type="text" value={filter} onChange={e => setFilter(e.target.value)} placeholder="Filter scopes..." style={{ width: "100%", boxSizing: "border-box", background: "#24273a", border: "1px solid #363a4f", color: "#cad3f5", borderRadius: 4, padding: "5px 8px", fontSize: 11, fontFamily: MONO, outline: "none", marginBottom: 6 }} />
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                {cats.map(c => (
                  <button key={c} onClick={() => setCatFilter(c)} style={{ background: catFilter === c ? "#89b4fa" : "#313244", color: catFilter === c ? "#11111b" : "#8087a2", border: "none", borderRadius: 10, padding: "2px 9px", fontSize: 10, fontFamily: MONO, cursor: "pointer", fontWeight: catFilter === c ? 600 : 400 }}>{c}</button>
                ))}
              </div>
            </div>
            {filtered.map(id => (
              <ScopeRow key={id} id={id} value={scopes[id] || ""} palette={adjPalette} onChange={v => setScopes(s => ({...s, [id]: v}))} />
            ))}
          </Acc>

          <Acc title="Global HSL" open={hslOpen} onToggle={() => setHslOpen(!hslOpen)}>
            {[
              { label: "Hue", value: hShift, set: setHShift, min: -180, max: 180, unit: "°" },
              { label: "Saturation", value: sShift, set: setSShift, min: -100, max: 100, unit: "%" },
              { label: "Lightness", value: lShift, set: setLShift, min: -100, max: 100, unit: "%" },
            ].map(sl => (
              <div key={sl.label} style={{ marginBottom: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                  <span style={{ fontSize: 11, color: "#8087a2", fontFamily: MONO }}>{sl.label}</span>
                  <span style={{ fontSize: 11, color: "#cad3f5", fontFamily: MONO, minWidth: 50, textAlign: "right" }}>
                    {(sl.value > 0 ? "+" : "") + sl.value + sl.unit}
                  </span>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input type="range" min={sl.min} max={sl.max} value={sl.value} onChange={e => sl.set(Number(e.target.value))}
                    style={{ flex: 1, accentColor: "#89b4fa", height: 4, cursor: "pointer" }} />
                  <button onClick={() => sl.set(0)}
                    style={{ background: "none", border: "1px solid #363a4f", color: "#5b6078", borderRadius: 3, padding: "1px 6px", cursor: "pointer", fontFamily: MONO, fontSize: 10, flexShrink: 0 }}
                    title="Reset">
                    {"↺"}
                  </button>
                </div>
              </div>
            ))}
            <div style={{ display: "flex", gap: 6, marginTop: 4, borderTop: "1px solid #2a2d3a", paddingTop: 8 }}>
              <button onClick={() => { setHShift(0); setSShift(0); setLShift(0); }}
                style={{ flex: 1, background: "#313244", color: "#8087a2", border: "1px solid #363a4f", borderRadius: 4, padding: "4px 8px", cursor: "pointer", fontFamily: MONO, fontSize: 10 }}>
                {"Reset All"}
              </button>
              <button onClick={() => { setPalette({...adjPalette}); setHShift(0); setSShift(0); setLShift(0); }}
                style={{ flex: 1, background: "#89b4fa", color: "#11111b", border: "none", borderRadius: 4, padding: "4px 8px", cursor: "pointer", fontFamily: MONO, fontSize: 10, fontWeight: 600 }}>
                {"Apply to Palette"}
              </button>
            </div>
          </Acc>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(HelixThemeEditor));
  </script>
</body>
</html>
